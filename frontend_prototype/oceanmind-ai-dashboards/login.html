<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OceanMind AI — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --teal-500: #00d4aa;
      --teal-400: #2eebc4;
      --teal-600: #00a88a;
      --teal-glow: rgba(0, 212, 170, 0.25);
      --dark-900: #0a1a1f;
      --dark-800: #0f2530;
      --dark-700: #14303d;
      --dark-600: #1a3d4d;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(0, 212, 170, 0.5);
      --text-primary: #f0f4f5;
      --text-secondary: rgba(240, 244, 245, 0.6);
      --text-muted: rgba(240, 244, 245, 0.4);
      --white: #ffffff;
      --google-blue: #4285f4;
      --google-red: #ea4335;
      --google-yellow: #fbbc05;
      --google-green: #34a853;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dark-900);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Ocean gradient background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 20% 20%, rgba(0, 168, 138, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse 100% 60% at 80% 80%, rgba(0, 212, 170, 0.1) 0%, transparent 50%),
        linear-gradient(180deg, var(--dark-800) 0%, var(--dark-900) 50%, var(--dark-700) 100%);
      z-index: 0;
    }

    /* Subtle wave animation */
    body::after {
      content: '';
      position: absolute;
      bottom: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at center, rgba(0, 212, 170, 0.03) 0%, transparent 60%);
      animation: wave 15s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes wave {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(2%, -2%) scale(1.02); }
      66% { transform: translate(-1%, 1%) scale(0.98); }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, var(--teal-500), var(--teal-600));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px var(--teal-glow);
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: var(--white);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .logo-text span {
      color: var(--teal-500);
    }

    /* Card */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--dark-800);
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--teal-500);
      cursor: pointer;
    }

    .remember-me span {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .forgot-link {
      font-size: 13px;
      color: var(--teal-500);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .forgot-link:hover {
      color: var(--teal-400);
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--teal-500), var(--teal-600));
      color: var(--white);
      box-shadow: 0 4px 16px var(--teal-glow);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(0, 212, 170, 0.35);
    }

    .btn-google {
      background: var(--white);
      color: #3c4043;
      font-weight: 500;
      margin-top: 14px;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .btn-google:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 20px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Footer */
    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .signup-link a {
      color: var(--teal-500);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s ease;
    }

    .signup-link a:hover {
      color: var(--teal-400);
    }

    /* Error state */
    .form-input.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }

    .error-message {
      font-size: 12px;
      color: #ef4444;
      margin-top: 4px;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    /* Toast */
    .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;background:rgba(0,212,170,0.9);opacity:0;animation:toastIn .3s forwards;z-index:100}
    @keyframes toastIn{to{opacity:1}}

    /* Loading spinner on button */
    .btn-primary .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
    .btn-primary.loading .spinner{display:inline-block}
    .btn-primary.loading .btn-text{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      body::after { animation: none; }
      .toast { animation: none; opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-container {
        padding: 16px;
      }

      .login-card {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container" data-od-id="login-page">
    <div class="logo" data-od-id="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
      </div>
      <div class="logo-text">Ocean<span>Mind</span> AI</div>
    </div>

    <div class="login-card" data-od-id="login-card">
      <div class="login-header">
        <h1>Welcome back</h1>
        <p>Sign in to access your ocean intelligence</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group" data-od-id="email-field">
          <label class="form-label" for="email">Email address</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="researcher@example.com"
            autocomplete="email"
            required
          >
          <div class="error-message" id="emailError">Please enter a valid email address</div>
        </div>

        <div class="form-group" data-od-id="password-field">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
          <div class="error-message" id="passwordError">Password is required</div>
        </div>

        <div class="form-row">
          <label class="remember-me">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" data-od-id="login-button">
          <span class="spinner"></span>
          <span class="btn-text">Sign In</span>
        </button>
      </form>

      <div class="divider">
        <span>or continue with</span>
      </div>

      <button class="btn btn-google" id="googleLogin" data-od-id="google-login-button">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="btn-text">Sign in with Google</span>
      </button>

      <div class="signup-link">
        Don't have an account? <a href="#">Request access</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const loginBtn = document.querySelector('[data-od-id="login-button"]');
    const googleBtn = document.getElementById('googleLogin');

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showError(input, errorEl) {
      input.classList.add('error');
      errorEl.classList.add('visible');
    }

    function clearError(input, errorEl) {
      input.classList.remove('error');
      errorEl.classList.remove('visible');
    }

    emailInput.addEventListener('input', () => {
      clearError(emailInput, emailError);
    });

    passwordInput.addEventListener('input', () => {
      clearError(passwordInput, passwordError);
    });

    function redirectToDashboard() {
      showToast('Login successful! Redirecting...');
      setTimeout(() => {
        window.location.href = 'dashboard-oceanographic.html';
      }, 800);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let valid = true;

      if (!validateEmail(emailInput.value)) {
        showError(emailInput, emailError);
        valid = false;
      }

      if (!passwordInput.value) {
        showError(passwordInput, passwordError);
        valid = false;
      }

      if (valid) {
        loginBtn.classList.add('loading');
        loginBtn.disabled = true;
        setTimeout(() => {
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          redirectToDashboard();
        }, 1200);
      }
    });

    googleBtn.addEventListener('click', () => {
      googleBtn.classList.add('loading');
      googleBtn.disabled = true;
      const textEl = googleBtn.querySelector('.btn-text');
      const originalText = textEl.textContent;
      textEl.textContent = 'Connecting...';
      setTimeout(() => {
        googleBtn.classList.remove('loading');
        googleBtn.disabled = false;
        textEl.textContent = originalText;
        redirectToDashboard();
      }, 1200);
    });
  </script>
</body>
</html>
